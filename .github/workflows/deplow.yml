name: 'Deploy QuickByte'
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'checkout'
        uses: actions/checkout@v3
      - name: 'SSH into EC2'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH}}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/quickbyte
            git pull origin master
            docker-compose down
            docker-compose up -d --build
